<div class="dialog-icon-row">
  <span class="dialog-icon-wrap">
    <mat-icon class="dialog-icon">warning_amber</mat-icon>
  </span>
</div>

<h2 mat-dialog-title class="dialog-title">{{ data.title }}</h2>

<mat-dialog-content class="dialog-message">
  {{ data.message }}
</mat-dialog-content>

<mat-dialog-actions align="end" class="dialog-actions">
  <button mat-stroked-button [mat-dialog-close]="false" class="cancel-btn">
    {{ data.cancelLabel }}
  </button>
  <button mat-flat-button color="warn" [mat-dialog-close]="true" class="confirm-btn">
    {{ data.confirmLabel }}
  </button>
</mat-dialog-actions>
